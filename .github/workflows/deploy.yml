name: CI/CD - Deploy notificaciones_serv

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build, Push y Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Obtener Account ID y construir ECR_URL
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_URL=${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build y Push imagen Docker
        run: |
          docker build --no-cache -t sanos-notificaciones-serv .
          docker tag sanos-notificaciones-serv:latest ${{ steps.account.outputs.ECR_URL }}/sanos-notificaciones-serv:${{ env.IMAGE_TAG }}
          docker push ${{ steps.account.outputs.ECR_URL }}/sanos-notificaciones-serv:${{ env.IMAGE_TAG }}

      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy en EKS
        run: |
          kubectl set image deployment/sanos-notificaciones notificaciones=${{ steps.account.outputs.ECR_URL }}/sanos-notificaciones-serv:${{ env.IMAGE_TAG }} -n ${{ secrets.EKS_NAMESPACE }}
          kubectl rollout status deployment/sanos-notificaciones -n ${{ secrets.EKS_NAMESPACE }} --timeout=300s


      - name: Mostrar resultado
        run: |
          echo "===================================="
          echo "Pods en namespace ${{ secrets.EKS_NAMESPACE }}:"
          kubectl get pods -n ${{ secrets.EKS_NAMESPACE }}
          echo "===================================="
